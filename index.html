<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генштаб: Глобальная Карта</title>
    <style>
        body { background: #1a1c1f; color: #eee; font-family: sans-serif; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .city-card { border: 1px solid #444; padding: 15px; margin: 10px; border-radius: 5px; background: #25282c; display: inline-block; width: 200px; }
        .gold { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Карта Мира (GitHub Edition)</h1>
        <div id="stats"></div>
        <hr>
        <div id="map"></div>
    </div>
    <script>
        fetch('game_state.json?t=' + Date.now()) // ?t= для обхода кэша
            .then(r => r.json())
            .then(data => {
                const map = document.getElementById('map');
                const stats = document.getElementById('stats');
                for (let name in data.players) {
                    let p = data.players[name];
                    stats.innerHTML += `<p>👤 ${name} (${p.country}): <span class="gold">${p.gold} £</span></p>`;
                    p.cities.forEach(city => {
                        map.innerHTML += `<div class="city-card">🏰 ${city}<br><small>${p.country}</small></div>`;
                    });
                }
            });
    </script>
</body>
</html>
