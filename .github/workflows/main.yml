name: Global_War_Engine
on:
  issues:
    types: [opened]
  schedule:
    - cron: '0 * * * *' # Начисление золота каждый час
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v3
      - name: Execute Game Logic
        run: |
          python engine.py "${{ github.event.issue.title }}" "${{ github.event.issue.user.login }}"
      - name: Auto-Close Issue
        if: github.event_name == 'issues'
        run: gh issue close ${{ github.event.issue.number }} --comment "Приказ принят и обработан Генеральным Штабом."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit State Changes
        run: |
          git config --global user.name 'Marshal-Bot'
          git config --global user.email 'bot@github.com'
          git add game_state.json
          git commit -m "Frontline Update: ${{ github.event.issue.title }}" || exit 0
          git push
